name: langs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch language bytes from GitHub API
        env:
          GH_TOKEN: ${{ secrets.LANGS_PAT }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          TOKEN = os.environ.get("GH_TOKEN", "")
          REPOS = [
              "code-rag", "caravan", "auto-dash", "daccord", "cioport", "concurrens", "cartodex",
              "quant-trading-gym", "invoice-parse", "portfolio", "paulxiep.github.io",
              "supeux", "pixie-space", "pixie-particle", "pixie-platform", "pixie-hologram",
              "pixie-gravity", "pixie-formation", "pixie-drive", "pixie-scope", "pixie-constellation"
              # === ADD PRIVATE REPO NAME(S) HERE, e.g. "my-private-repo" ===
          ]
          headers = {"Accept": "application/vnd.github+json", "User-Agent": "langs-workflow"}
          if TOKEN:
              headers["Authorization"] = f"Bearer {TOKEN}"
          totals = {}
          for r in REPOS:
              url = f"https://api.github.com/repos/paulxiep/{r}/languages"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as resp:
                  data = json.load(resp)
              for lang, b in data.items():
                  totals[lang] = totals.get(lang, 0) + b
          json.dump(totals, open("langs.json", "w"), indent=2)
          print(totals)
          PY

      - name: Render SVG
        run: python3 tools/render_langs.py langs.json langs.svg

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add langs.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh language breakdown"
            git push
          fi
